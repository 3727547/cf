name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - '_worker.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare (Keep All Settings)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🚀 开始部署 Worker..."
          echo "📋 部署信息:"
          echo "  - Worker名称: cf"
          echo "  - 域名: cf.3727547.xyz (保持不变)"
          echo "  - 所有环境变量: 保持不变"
          echo "  - 访问密码: 保持不变"
          echo ""
          wrangler deploy _worker.js --name cf --compatibility-date 2024-01-01 --keep-vars
          echo ""
          echo "✅ 部署完成！"
          echo "🌐 访问地址: https://cf.3727547.xyz/panel"
          echo "🔑 密码: 保持不变"
