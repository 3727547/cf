name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - '_worker.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker and Set Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          UUID: ${{ secrets.UUID }}
          TR_PASS: ${{ secrets.TR_PASS }}
          PROXY_IP: ${{ secrets.PROXY_IP }}
        run: |
          echo "🚀 开始部署 Worker..."
          echo "📋 部署信息:"
          echo "  - Worker名称: cf-new"
          echo "  - 版本: BPB Panel v4.1.3"
          echo ""
          
          # 部署 Worker
          wrangler deploy _worker.js --name cf-new --compatibility-date 2024-01-01
          
          echo ""
          echo "🔧 设置环境变量..."
          
          # 设置环境变量
          echo "$UUID" | wrangler secret put UUID --name cf-new
          echo "$TR_PASS" | wrangler secret put TR_PASS --name cf-new  
          echo "$PROXY_IP" | wrangler secret put PROXY_IP --name cf-new
          
          echo ""
          echo "✅ 部署完成！"
          echo "🌐 访问: https://cf-new.你的账户.workers.dev/panel"
          echo "🔑 密码: 你的UUID"
