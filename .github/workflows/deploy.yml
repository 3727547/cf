name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - '_worker.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare (cf-new)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🚀 开始部署 Worker..."
          echo "📋 部署信息:"
          echo "  - Worker名称: cf-new"
          echo "  - 版本: BPB Panel v4.1.3"
          echo ""
          wrangler deploy _worker.js --name cf-new --compatibility-date 2024-01-01
          echo ""
          echo "✅ 部署完成！"
          echo "🌐 默认域名: https://cf-new.你的账户.workers.dev/panel"
          echo "🔑 请在Cloudflare Dashboard设置环境变量:"
          echo "   - UUID"
          echo "   - TR_PASS"
          echo "   - PROXY_IP"
